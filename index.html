<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Story Room</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <main id="app-container">
        <!-- ======================= HOME PAGE ======================= -->
        <div id="home-page" class="page active">
            <header class="hero-section">
                <h1>The Story Room</h1>
                <p>Your personal sanctuary for words and wonder.</p>
            </header>
            
            <section class="content-grid">
                <h2>Explore</h2>
                <div class="card" id="story-card">
                    <h3>The Differnet Love</h3>
                    <p>A short story in parts. Tap to begin.</p>
                </div>
                <div class="card coming-soon">
                    <h3>Poems</h3>
                    <p>Coming Soon</p>
                </div>
                <div class="card coming-soon">
                    <h3>Quotes</h3>
                    <p>Coming Soon</p>
                </div>
                <div class="card coming-soon">
                    <h3>Songs</h3>
                    <p>Coming Soon</p>
                </div>
            </section>
        </div>

        <!-- ======================= STORY READER PAGE ======================= -->
        <div id="story-reader-page" class="page">
            <header class="reader-header">
                <button id="back-to-home-btn">&larr; Back</button>
                <h2 id="story-title"></h2>
            </header>
            <nav id="chapter-nav">
                <!-- Chapter buttons will be generated by JS -->
            </nav>
            <article id="chapter-content">
                <!-- Chapter text will be loaded by JS -->
            </article>
        </div>
        
        <!-- You can add more pages here later -->
        <div id="explore-page" class="page">
             <h1>Explore (Coming Soon)</h1>
        </div>
        <div id="profile-page" class="page">
             <h1>Profile (Coming Soon)</h1>
        </div>

    </main>

    <!-- ======================= BOTTOM NAVIGATION ======================= -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item active" data-target="home-page">
            <span>Home</span>
        </a>
        <a href="#" class="nav-item" data-target="explore-page">
            <span>Explore</span>
        </a>
        <a href="#" class="nav-item" data-target="profile-page">
            <span>Profile</span>
        </a>
    </nav>

    <script src="js/app.js"></script>
</body>
</html>
